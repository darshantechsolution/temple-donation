<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Temple Donation</title>

<style>
body{
font-family:Arial;
background:#f2f2f2;
text-align:center;
padding:20px;
margin:0;
}

.container{
max-width:500px;
margin:auto;
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.topimg{
width:100%;
border-radius:12px;
margin-bottom:15px;
}

input{
width:90%;
padding:12px;
margin:8px;
border:1px solid #ccc;
border-radius:5px;
font-size:16px;
}

button{
background:#0f9d58;
color:white;
border:none;
padding:14px 20px;
border-radius:6px;
font-size:16px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#0c7f47;
}

.qr{
width:220px;
margin-top:15px;
}

.receipt{
display:none;
margin-top:20px;
padding-top:15px;
border-top:1px solid #ddd;
}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

th,td{
border:1px solid #ddd;
padding:10px;
font-size:14px;
}

th{
background:#f5f5f5;
}
</style>

<script>

function loadDonors(){

fetch("YOUR_SCRIPT_URL")
.then(res=>res.json())
.then(data=>{

document.getElementById("totalAmount").innerText="₹"+data.total;

let percent=(data.total/100000)*100;
if(percent>100) percent=100;

document.getElementById("progressBar").style.width=percent+"%";

var table=document.getElementById("donorTable");

for(let i=0;i<data.donors.length;i++){

var row=table.insertRow(-1);

row.insertCell(0).innerHTML=data.donors[i].name;
row.insertCell(1).innerHTML=data.donors[i].place;
row.insertCell(2).innerHTML="₹"+data.donors[i].amount;

}

});

}

function payNow(){

var name=document.getElementById("name").value.trim();
var place=document.getElementById("place").value.trim();
var amount=document.getElementById("amount").value.trim();
var refer=document.getElementById("refer").value.trim();

if(name=="" || amount==""){
alert("Please fill Name and Amount");
return;
}

amount=amount.replace(/[^\d]/g,'');

fetch("SCRIPT URL",{
method:"POST",
body:new URLSearchParams({
name:name,
place:place,
amount:amount,
refer:refer
})
})
.then(res=>res.text())
.then(receipt=>{

localStorage.setItem("receipt",receipt);
localStorage.setItem("name",name);
localStorage.setItem("place",place);
localStorage.setItem("amount",amount);
localStorage.setItem("refer",refer);

var txn="TXN"+Date.now();

var upi="upi://pay?pa=stn.suthakar@sbi&pn=PayeeName&am=10.00&cu=INR&tn=TransactionNote";
  
window.location.href=upi;

});

}

function showReceipt(){

document.getElementById("receiptBox").style.display="block";

document.getElementById("r").innerText=localStorage.getItem("receipt");
document.getElementById("n").innerText=localStorage.getItem("name");
document.getElementById("p").innerText=localStorage.getItem("place");
document.getElementById("a").innerText=localStorage.getItem("amount");
document.getElementById("rf").innerText=localStorage.getItem("refer");

}

window.onload=loadDonors;

</script>
</head>

<body>

<div class="container">

<img src="temple-banner.jpg" class="topimg" alt="Temple">

<h2>🛕 Temple Statue Donation Fund-1</h2>

<p>Support the sacred work of building our temple god statue 🙏</p>

<h3>Donation Progress</h3>

<div style="background:#ddd;border-radius:20px;height:25px;overflow:hidden;">
<div id="progressBar" style="width:0%;background:#0f9d58;height:25px;color:white;line-height:25px;">
<span id="totalAmount">₹0</span> / ₹1,00,000
</div>
</div>

<br>

<input type="text" id="name" placeholder="Your Name">

<input type="text" id="place" placeholder="Place">

<input type="tel" id="amount" placeholder="Donation Amount">

<input type="text" id="refer" placeholder="Referred By">

<br>

<button onclick="payNow()">Pay via GPay / PhonePe</button>

<br><br>

<img src="upi-qr.png" class="qr" alt="UPI QR">

<p>Scan QR if payment app does not open</p>

<br>

<button onclick="showReceipt()">I Have Completed Payment</button>

<div id="receiptBox" class="receipt">

<h3>🧾 Donation Receipt</h3>

<p><b>Receipt No:</b> <span id="r"></span></p>
<p><b>Name:</b> <span id="n"></span></p>
<p><b>Place:</b> <span id="p"></span></p>
<p><b>Amount:</b> ₹<span id="a"></span></p>
<p><b>Referred By:</b> <span id="rf"></span></p>

<button onclick="window.print()">Print Receipt</button>

</div>

<h3>👥 Recent Donors</h3>

<table id="donorTable">
<tr>
<th>Name</th>
<th>Place</th>
<th>Amount</th>
</tr>
</table>

</div>

</body>
</html>
