<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Temple Donation</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f8f4e8;
    text-align:center;
    padding:20px;
}

.container{
    max-width:400px;
    margin:auto;
    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

h1{
    color:#b22222;
}

input{
    width:90%;
    padding:12px;
    font-size:18px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:8px;
}

.amount-buttons button{
    margin:5px;
    padding:10px 15px;
    border:none;
    border-radius:8px;
    background:#ff9800;
    color:white;
    font-size:16px;
    cursor:pointer;
}

.pay-btn{
    display:block;
    width:100%;
    padding:15px;
    margin-top:15px;
    background:green;
    color:white;
    font-size:18px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

.pay-btn:hover{
    background:darkgreen;
}
</style>
</head>

<body>

<div class="container">
    <h1>🛕 Temple Donation</h1>
    <p>Support Temple Renovation</p>

    <input type="number" id="amount" placeholder="Enter Donation Amount">

    <div class="amount-buttons">
        <button onclick="setAmount(50)">₹50</button>
        <button onclick="setAmount(100)">₹100</button>
        <button onclick="setAmount(500)">₹500</button>
    </div>

    <button class="pay-btn" onclick="payNow()">Pay via UPI</button>
</div>

<script>
function setAmount(value){
    document.getElementById("amount").value = value;
}

function payNow(){
    let amount = document.getElementById("amount").value;

    if(amount=="" || amount<=0){
        alert("Please enter valid amount");
        return;
    }

    let upi = "upi://pay?pa=stn.suthakar@icici&pn=Temple Donation&am=" + amount + "&cu=INR";

    window.location.href = upi;
}
</script>

</body>
</html>
