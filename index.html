<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ஸ்ரீ முத்து மாரியம்மன் கோவில் திருப்பணி நன்கொடை - புதுத் தேவங்குடி</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
margin:0;
padding:20px;
text-align:center;
}

.container{
max-width:500px;
margin:auto;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.topimg{
width:100%;
border-radius:10px;
margin-bottom:15px;
}

input{
width:90%;
padding:12px;
margin:8px;
border-radius:5px;
border:1px solid #ccc;
}

button{
background:#0f9d58;
color:white;
border:none;
padding:14px 25px;
font-size:16px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#0c7f47;
}

.receipt{
display:none;
margin-top:20px;
border-top:1px solid #ddd;
padding-top:20px;
}

.print{
background:#333;
}

</style>

<script>

function payNow(){

var name=document.getElementById("name").value;
var place=document.getElementById("place").value;
var amount=document.getElementById("amount").value;
var refer=document.getElementById("refer").value;

if(name=="" || amount==""){
alert("Please fill Name and Amount");
return;
}

fetch("YOUR_GOOGLE_SCRIPT_URL",{
method:"POST",
body:new URLSearchParams({
name:name,
place:place,
amount:amount,
refer:refer
})
})
.then(res=>res.text())
.then(receipt=>{

localStorage.setItem("receipt",receipt);
localStorage.setItem("name",name);
localStorage.setItem("place",place);
localStorage.setItem("amount",amount);
localStorage.setItem("refer",refer);

var upi="upi://pay?pa=stn.suthakar@oksbi&pn=Temple%20Donation&am="+amount+"&cu=INR";

window.location.href=upi;

});

}

function showReceipt(){

document.getElementById("receiptBox").style.display="block";

document.getElementById("r").innerText=localStorage.getItem("receipt");
document.getElementById("n").innerText=localStorage.getItem("name");
document.getElementById("p").innerText=localStorage.getItem("place");
document.getElementById("a").innerText=localStorage.getItem("amount");
document.getElementById("rf").innerText=localStorage.getItem("refer");

}

</script>

</head>

<body>

<div class="container">

<img src="temple.jpg" class="topimg">

<h2>🛕 ஸ்ரீ முத்து மாரியம்மன் கோவில் திருப்பணி நன்கொடை - புதுத் தேவங்குடி </h2>

<input type="text" id="name" placeholder="பெயர்">

<input type="text" id="place" placeholder="ஊர்">

<input type="number" id="amount" placeholder="தொகை">

<input type="text" id="refer" placeholder="பரிந்துரை செய்தவர்">

<br><br>

<button onclick="payNow()">Pay via GPay / PhonePe</button>

<br><br>

<button onclick="showReceipt()">திருப்பணி நன்கொடை செலுத்திவிட்டேன்</button>

<div id="receiptBox" class="receipt">

<h3>🙏 நன்கொடை ரசீசு</h3>

<p><b>Receipt No:</b> <span id="r"></span></p>

<p><b>பெயர்:</b> <span id="n"></span></p>

<p><b>ஊர்:</b> <span id="p"></span></p>

<p><b>தொகை:</b> ₹<span id="a"></span></p>

<p><b>பரிந்துரை செய்தவர்:</b> <span id="rf"></span></p>

<p>நன்கொடை செலுத்தியமைக்கு நன்றி - ஃப்ரண்ட்ஸ் குரூப் & இளஞ்சிட்டு நண்பர்கள், புதுத்தேவங்குடி</p>

<button class="print" onclick="window.print()">Print Receipt</button>

</div>

</div>

</body>
</html>
