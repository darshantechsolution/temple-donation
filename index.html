<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Temple Donation</title>

<style>
body{
font-family:Arial;
background:#f2f2f2;
text-align:center;
padding:20px;
margin:0;
}

.container{
max-width:500px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.topimg{
width:100%;
border-radius:10px;
margin-bottom:15px;
}

input{
width:90%;
padding:12px;
margin:8px;
border:1px solid #ccc;
border-radius:5px;
font-size:16px;
}

button{
background:#0f9d58;
color:white;
border:none;
padding:14px 20px;
border-radius:6px;
font-size:16px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#0c7f47;
}

.receipt{
display:none;
margin-top:20px;
padding-top:15px;
border-top:1px solid #ddd;
}

.qr{
width:220px;
margin-top:15px;
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
}

th,td{
border:1px solid #ddd;
padding:8px;
font-size:14px;
}
</style>

<script>

function payNow(){

var name=document.getElementById("name").value.trim();
var place=document.getElementById("place").value.trim();
var amount=document.getElementById("amount").value.trim();
var refer=document.getElementById("refer").value.trim();

if(name=="" || amount==""){
alert("Please fill Name and Amount");
return;
}

amount = amount.replace(/[^0-9]/g,'');

fetch("YOUR_GOOGLE_SCRIPT_URL",{
method:"POST",
body:new URLSearchParams({
name:name,
place:place,
amount:amount,
refer:refer
})
})
.then(res=>res.text())
.then(receipt=>{

localStorage.setItem("receipt",receipt);
localStorage.setItem("name",name);
localStorage.setItem("place",place);
localStorage.setItem("amount",amount);
localStorage.setItem("refer",refer);

var txn="TXN"+Date.now();

var upi="upi://pay?pa=YOURUPI@okaxis&pn=Temple%20Donation&am="+amount+"&cu=INR&tn=Temple%20Donation&tr="+txn;

window.location.href=upi;

});

}

function showReceipt(){

document.getElementById("receiptBox").style.display="block";

document.getElementById("r").innerText=localStorage.getItem("receipt");
document.getElementById("n").innerText=localStorage.getItem("name");
document.getElementById("p").innerText=localStorage.getItem("place");
document.getElementById("a").innerText=localStorage.getItem("amount");
document.getElementById("rf").innerText=localStorage.getItem("refer");

addDonor();

}

function addDonor(){

var table=document.getElementById("donorTable");

var row=table.insertRow(-1);

row.insertCell(0).innerHTML=localStorage.getItem("name");
row.insertCell(1).innerHTML=localStorage.getItem("place");
row.insertCell(2).innerHTML="₹"+localStorage.getItem("amount");

}

</script>
</head>

<body>

<div class="container">

<img src="temple.jpg" class="topimg" alt="Temple">

<h2>🛕 Temple Statue Donation</h2>

<p>Your contribution helps us build the temple god statue.</p>

<input type="text" id="name" placeholder="Name">

<input type="text" id="place" placeholder="Place">

<input type="tel" id="amount" placeholder="Donation Amount">

<input type="text" id="refer" placeholder="Referred By">

<br>

<button onclick="payNow()">Pay via GPay / PhonePe</button>

<br><br>

<img src="upi-qr.png" class="qr" alt="UPI QR">

<p>Scan QR if payment app does not open</p>

<br>

<button onclick="showReceipt()">I Have Completed Payment</button>

<div id="receiptBox" class="receipt">

<h3>🙏 Donation Receipt</h3>

<p><b>Receipt No:</b> <span id="r"></span></p>
<p><b>Name:</b> <span id="n"></span></p>
<p><b>Place:</b> <span id="p"></span></p>
<p><b>Amount:</b> ₹<span id="a"></span></p>
<p><b>Referred By:</b> <span id="rf"></span></p>

<button onclick="window.print()">Print Receipt</button>

</div>

<h3>Recent Donors</h3>

<table id="donorTable">
<tr>
<th>Name</th>
<th>Place</th>
<th>Amount</th>
</tr>
</table>

</div>

</body>
</html>
