<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Temple Donation</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
margin:0;
padding:20px;
text-align:center;
}

.container{
max-width:500px;
margin:auto;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h1{
color:#b22222;
}

input{
width:90%;
padding:12px;
margin:8px;
border-radius:5px;
border:1px solid #ccc;
font-size:15px;
}

button{
background:#0f9d58;
color:white;
border:none;
padding:14px 25px;
font-size:16px;
border-radius:6px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#0c7f47;
}

.receipt{
display:none;
margin-top:20px;
border-top:1px solid #ddd;
padding-top:20px;
}

.print{
background:#333;
}

</style>

<script>

function payNow(){

var name=document.getElementById("name").value;
var place=document.getElementById("place").value;
var amount=document.getElementById("amount").value;
var refer=document.getElementById("refer").value;

if(name=="" || amount==""){
alert("Please fill required fields");
return;
}

localStorage.setItem("donorName",name);
localStorage.setItem("donorPlace",place);
localStorage.setItem("donorAmount",amount);
localStorage.setItem("donorRefer",refer);

var upi="upi://pay?pa=YOURUPI@okaxis&pn=Temple Donation&am="+amount+"&cu=INR&tn=Temple Donation";

window.location.href=upi;

}

function showReceipt(){

document.getElementById("donorName").innerText=localStorage.getItem("donorName");
document.getElementById("donorPlace").innerText=localStorage.getItem("donorPlace");
document.getElementById("donorAmount").innerText=localStorage.getItem("donorAmount");
document.getElementById("donorRefer").innerText=localStorage.getItem("donorRefer");

document.getElementById("receipt").style.display="block";

}

</script>

</head>

<body onload="showReceipt()">

<div class="container">

<h1>🛕 Temple Statue Donation</h1>

<p>Your contribution helps us build the temple god statue.</p>

<input type="text" id="name" placeholder="Name">

<input type="text" id="place" placeholder="Place">

<input type="number" id="amount" placeholder="Donation Amount">

<input type="text" id="refer" placeholder="Referred By">

<br>

<button onclick="payNow()">Pay via GPay / PhonePe</button>

<div id="receipt" class="receipt">

<h2>🙏 Donation Receipt</h2>

<p><b>Name:</b> <span id="donorName"></span></p>

<p><b>Place:</b> <span id="donorPlace"></span></p>

<p><b>Amount:</b> ₹<span id="donorAmount"></span></p>

<p><b>Referred By:</b> <span id="donorRefer"></span></p>

<p>Thank you for supporting the temple statue creation.</p>

<button class="print" onclick="window.print()">Print Receipt</button>

</div>

</div>

</body>
</html>
